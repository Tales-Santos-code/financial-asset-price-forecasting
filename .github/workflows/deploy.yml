  # ==========================================
  # JOB 2: DEPLOY DA API NA MÁQUINA 1
  # ==========================================
  deploy-api:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: 🔐 Autenticar na AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: 🌐 Pegar IP Público da Máquina 1 (API)
      id: get-ip
      run: |
        # ATENÇÃO: Adicione o EC2_API_INSTANCE_ID nos seus Secrets do GitHub!
        PUBLIC_IP=$(aws ec2 describe-instances --instance-ids ${{ secrets.EC2_API_INSTANCE_ID }} --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
        echo "ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

    - name: 🚀 Acessar via SSH e Atualizar API
      uses: appleboy/ssh-action@master
      with:
        host: ${{ steps.get-ip.outputs.ip }}
        username: ec2-user 
        key: ${{ secrets.EC2_API_SSH_KEY }}
        script: |
          # 🛠️ AUTO-SETUP: Prepara a máquina nova (Amazon Linux 2023)
          if ! command -v docker &> /dev/null || ! docker buildx version &> /dev/null; then
            echo "Instalando Git e Docker..."
            sudo dnf update -y
            sudo dnf install -y git docker
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ec2-user
            sudo chmod 666 /var/run/docker.sock 
            
            echo "Instalando Docker Compose..."
            sudo mkdir -p /usr/libexec/docker/cli-plugins
            sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/libexec/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/libexec/docker/cli-plugins/docker-compose

            echo "Instalando Docker Buildx (necessário para o Compose)..."
            sudo curl -SL https://github.com/docker/buildx/releases/latest/download/buildx-v0.17.1.linux-amd64 -o /usr/libexec/docker/cli-plugins/docker-buildx
            sudo chmod +x /usr/libexec/docker/cli-plugins/docker-buildx
          fi

          # 📁 Gerencia o Repositório na Máquina 1
          cd /home/ec2-user
          if [ ! -d "financial-asset-price-forecasting" ]; then
            echo "Clonando o repositório pela primeira vez..."
            git clone https://github.com/Tales-Santos-code/financial-asset-price-forecasting.git
          fi
          
          # Entra na pasta correta do ec2-user
          cd /home/ec2-user/financial-asset-price-forecasting
          
          echo "Puxando novo código do GitHub..."
          git checkout .
          git pull origin main
          
          echo "Recriando e subindo o contêiner da API..."
          docker compose up -d --build
          
          echo "Limpando imagens antigas do Docker para economizar disco..."
          docker image prune -f
          
          echo "--- LOGS DA API ---"
          docker compose logs