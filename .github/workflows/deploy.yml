name: CI/CD Pipeline - Deploy API (Máquina 1)

on:
  push:
    branches: [ main ]

jobs:
  # ==========================================
  # JOB 1: INTEGRAÇÃO CONTÍNUA
  # ==========================================
  test:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Clonar o Código
      uses: actions/checkout@v3

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Instalar dependências de Teste
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        pip install -r requirements.txt 

    - name: 🧹 Linting e Formatação (Ruff)
      run: |
        echo "Verificando se o código segue a PEP8..."
        ruff check app/

  # ==========================================
  # JOB 2: DEPLOY DA API NA MÁQUINA 1
  # ==========================================
  deploy-api:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: 🔐 Autenticar na AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: 🌐 Pegar IP Público da Máquina 1 (API)
      id: get-ip
      run: |
        # ATENÇÃO: Adicione o EC2_API_INSTANCE_ID nos seus Secrets do GitHub!
        PUBLIC_IP=$(aws ec2 describe-instances --instance-ids ${{ secrets.EC2_API_INSTANCE_ID }} --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
        echo "ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

    - name: 🚀 Acessar via SSH e Atualizar API
      uses: appleboy/ssh-action@master
      with:
        host: ${{ steps.get-ip.outputs.ip }}
        username: ubuntu 
        key: ${{ secrets.EC2_API_SSH_KEY }} # Pode usar a mesma chave SSH para ambas as máquinas
        script: |
          # 📁 Gerencia o Repositório na Máquina 1
          cd /home/ubuntu
          if [ ! -d "financial-asset-price-forecasting" ]; then
            echo "Clonando o repositório pela primeira vez..."
            git clone https://github.com/Tales-Santos-code/financial-asset-price-forecasting.git
          fi
          
          cd /home/ubuntu/financial-asset-price-forecasting
          
          echo "Puxando novo código do GitHub..."
          git checkout .
          git pull origin main
          
          echo "Recriando e subindo o contêiner da API..."
          docker compose up -d --build
          
          echo "Limpando imagens antigas do Docker para economizar disco..."
          docker image prune -f