name: CI/CD Pipeline - Deploy API

on:
  push:
    branches: [ main ]

jobs:
  # ==========================================
  # JOB 1: INTEGRAÇÃO CONTÍNUA
  # ==========================================
  test:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Clonar o Código
      uses: actions/checkout@v3

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Instalar dependências de Teste
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        pip install -r requirements.txt 

    - name: 🧹 Linting e Formatação (Ruff)
      run: |
        echo "Verificando se o código segue a PEP8..."
        ruff check app/

  # ==========================================
  # JOB 2: DEPLOY DA API NA MÁQUINA 1
  # ==========================================
  deploy-api:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: 🔐 Autenticar na AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: 🌐 Pegar IP Público da Máquina 1 (API)
      id: get-ip
      run: |
        # ATENÇÃO: Adicione o EC2_API_INSTANCE_ID nos seus Secrets do GitHub!
        PUBLIC_IP=$(aws ec2 describe-instances --instance-ids ${{ secrets.EC2_API_INSTANCE_ID }} --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
        echo "ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

    - name: 🚀 Acessar via SSH e Atualizar API
      uses: appleboy/ssh-action@master
      with:
        host: ${{ steps.get-ip.outputs.ip }}
        username: ec2-user 
        key: ${{ secrets.EC2_API_SSH_KEY }}
        script: |
          # 1. Garante o Docker base (só instala se não existir)
          if ! command -v docker &> /dev/null; then
            echo "Instalando Git e Docker..."
            sudo dnf update -y
            sudo dnf install -y git docker
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ec2-user
            sudo chmod 666 /var/run/docker.sock 
          fi

          # 2. Força a atualização dos plugins (Resolve o erro do Buildx)
          echo "Atualizando plugins do Docker..."
          sudo mkdir -p /usr/libexec/docker/cli-plugins
          sudo curl -sSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/libexec/docker/cli-plugins/docker-compose
          sudo chmod +x /usr/libexec/docker/cli-plugins/docker-compose
          sudo curl -sSL https://github.com/docker/buildx/releases/download/v0.17.1/buildx-v0.17.1.linux-amd64 -o /usr/libexec/docker/cli-plugins/docker-buildx
          sudo chmod +x /usr/libexec/docker/cli-plugins/docker-buildx

          # 3. Gerencia o Repositório
          cd /home/ec2-user
          if [ ! -d "financial-asset-price-forecasting" ]; then
            echo "Clonando o repositório..."
            git clone https://github.com/Tales-Santos-code/financial-asset-price-forecasting.git
          fi
          
          cd /home/ec2-user/financial-asset-price-forecasting
          
          echo "Puxando código novo..."
          git checkout .
          git pull origin main
          
          echo "Subindo API..."
          docker compose up -d --build
          
          docker image prune -f
          
          echo "--- LOGS DA API ---"
          docker compose logs