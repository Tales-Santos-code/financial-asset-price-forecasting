name: Retreino Automático de MLOps

# Permite que o workflow seja acionado via API (pelo seu código Python na AWS Lambda)
on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Ticker da ação para retreino'
        required: true
        default: 'RACE'

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ Configurar Credenciais AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 2️⃣ Ligar a Máquina EC2 (MLflow Server & Training)
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }}
          echo "Aguardando a máquina inicializar na AWS..."
          aws ec2 wait instance-running --instance-ids ${{ secrets.EC2_INSTANCE_ID }}
          sleep 30 # Dá um tempo extra para o serviço SSH do Linux ligar

      - name: 3️⃣ Pegar IP Público da Máquina
        id: get-ip
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }} --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          echo "ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "Máquina online no IP: $PUBLIC_IP"

      - name: 4️⃣ Acessar via SSH, Configurar Ambiente e Rodar Retreino
        uses: appleboy/ssh-action@master
        env: 
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          MLFLOW_TRACKING_URI: http://127.0.0.1:5000
          # Variável segura para o Linux ler (fallback para RACE se vier vazio)
          TARGET_SYMBOL: ${{ github.event.inputs.symbol || 'RACE' }}
        with:
          host: ${{ steps.get-ip.outputs.ip }}
          username: ubuntu # Usuário padrão da EC2 Ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # Injeta as variáveis do GitHub para dentro do terminal SSH da EC2
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,MLFLOW_TRACKING_URI,TARGET_SYMBOL
          timeout: 240m # Dá um tempo generoso para o treino rodar, evitando timeouts prematuros
          script: |
            # 🚨 O BOTÃO DO HOMEM MORTO: Agenda o desligamento da máquina para daqui a 240 min.
            # Se a máquina travar por falta de RAM, ela vai se auto-desligar!
            set -e

            sudo shutdown -P +240 "Desligamento de segurança ativado pelo GitHub Actions"
            
            cd /home/ubuntu
            
            # 📁 Gerencia o Repositório
            if [ ! -d "financial-asset-price-forecasting" ]; then
              echo "Clonando o repositório..."
              git clone https://github.com/Tales-Santos-code/financial-asset-price-forecasting.git
            fi
            
            cd financial-asset-price-forecasting
            echo "Limpando arquivos temporários e forçando atualização..."
            git checkout .
            git clean -fd -e venv/
            git pull origin main
            
            # Garante que o docker vai subir limpo (a flag -v mata o banco corrompido)
            docker compose -f app/ml/server/docker-compose-ec2.yaml down -v

            # 🐳 Garante que o MLflow (Cartório) está online antes do treino
            echo "Subindo o MLflow via Docker Compose..."
            docker compose -f app/ml/server/docker-compose-ec2.yaml up -d

            # Dá um tempo para o banco e o servidor MLflow iniciarem completamente
            echo "Aguardando o MLflow ficar online..."
            MLFLOW_UP=false
            for i in {1..40}; do
              # Removemos a flag -f e o /ping. Adicionamos um timeout de 3s para não travar.
              # Se o servidor responder a qualquer conexão HTTP, ele passa!
              if curl --max-time 3 -s http://127.0.0.1:5000 > /dev/null; then
                echo "✅ MLflow está online e aceitando conexões!"
                MLFLOW_UP=true
                break
              fi
              echo "⏳ Aguardando a porta 5000 abrir... ($i/40)"
              sleep 10
            done
            
            # Trava de segurança: Se o MLflow não subiu, cancela tudo!
            if [ "$MLFLOW_UP" = false ]; then
              echo "❌ ERRO CRÍTICO: MLflow não ligou após 200 segundos. Abortando esteira!"
              docker compose -f app/ml/server/docker-compose-ec2.yaml logs
              sudo shutdown -c
              exit 1
            fi
            
            # 🐍 Configura e ativa o ambiente virtual do Python
            echo "Configurando dependências do Python..."
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install --prefer-binary -r app/ml/server/requirements-ml.txt
            
            # 🚀 O GRANDE MOMENTO: Roda a Fábrica de Experimentos usando o Bash seguro
            echo "Iniciando o retreino para: $TARGET_SYMBOL"
            PYTHONPATH=. PYTHONUNBUFFERED=1 timeout 210m python app/ml/training/random_search.py --symbol $TARGET_SYMBOL --verbose
            
            # 🛑 Se o código chegou até aqui, foi um sucesso! Cancela o desligamento programado.
            sudo shutdown -c
            echo "Treino concluído com sucesso. Desligamento emergencial cancelado."

      - name: 5️⃣ Faxina de Disco (Post-Treino)
        if: always() # Garante a execução mesmo se o passo 4 der erro (ex: falta de espaço)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.get-ip.outputs.ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Iniciando limpeza de disco para evitar gargalos na próxima execução..."
            
            # Limpa o cache pesado de downloads do PIP (PyTorch, etc)
            rm -rf /home/ubuntu/.cache/pip
            
            # Derruba o container do MLflow adequadamente antes de limpar
            cd /home/ubuntu/financial-asset-price-forecasting
            docker compose -f app/ml/server/docker-compose-ec2.yaml down -v
            
            # Remove todas as imagens, containers e volumes Docker não utilizados
            docker system prune -af --volumes
            
            echo "Espaço em disco após a limpeza:"
            df -h /

      - name: 6️⃣ Desligar a Máquina EC2 (Economia!)
        if: always() # IMPORTANTÍSSIMO: Roda essa etapa MESMO se o passo anterior der erro!
        run: |
          echo "Desligando a EC2 para não gerar custos..."
          aws ec2 stop-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }}